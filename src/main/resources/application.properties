spring.application.name=jm-proposal

server.port=8082
spring.datasource.url=jdbc:postgresql://localhost:5432/job_matrix_local
spring.datasource.username=job_matrix
spring.datasource.password=job_matrix
spring.datasource.driver-class-name =org.postgresql.Driver

spring.jpa.hibernate.ddl-auto = validate
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=10

spring.profiles.active=local

#kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.topic.proposal-submitted=proposal-submitted

# AWS S3 Configuration
aws.region=ap-south-1
aws.s3.bucket-name=jm-proposal-attachments
aws.s3.key-prefix=proposal-attachments

# AWS Credentials (for local development)
# Option 1: Direct credentials (not recommended for production)
# aws.access-key-id=YOUR_ACCESS_KEY
# aws.secret-access-key=YOUR_SECRET_KEY

# Option 2: Use AWS credentials file (recommended)
# Make sure to configure AWS CLI first: aws configure
spring.cloud.aws.credentials.profile=default
spring.cloud.aws.region.static=ap-south-1

# Multipart file configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB